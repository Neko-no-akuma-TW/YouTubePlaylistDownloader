name: readme-workflow.yml
on:
  push:
    branches:
      - main
jobs:
  contrib-readme-job:
    runs-on: ubuntu-latest
    name: A job to auomate contrib in readme
    steps:
      - name: Contibute List
        uses: akhilmhdh/contributors-readme-action@v2.3.6
        env:
          GITHUB_TOKEN: ${{ secrets.CONTRIBUTE_TOKEN }}